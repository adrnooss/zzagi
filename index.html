<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Gizza 💖</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="falling-hearts" id="falling-hearts"></div>

    <main class="container">
        <!-- Background Hati (Masking) dipisah agar tidak mengganggu layout teks -->
        <div class="heart-mask"></div>
        
        <!-- Area Konten (Aman dari potongan pinggir hati) -->
        <div class="content-area">
            <!-- Step 1 -->
            <section id="step-1" class="step active">
                <h1 class="romantic-font" id="text-1-1"></h1>
                <p id="text-1-2"></p>
                <button class="btn primary-btn hidden-element" id="btn-1" onclick="nextStep(2)">Next</button>
            </section>

            <!-- Step 2 -->
            <section id="step-2" class="step hidden">
                <h2 class="romantic-font" id="text-2-1"></h2>
                <p id="text-2-2"></p>
                <p id="text-2-3"></p>
                <button class="btn primary-btn hidden-element" id="btn-2" onclick="nextStep(3)">Keep reading</button>
            </section>

            <!-- Step 3 -->
            <section id="step-3" class="step hidden">
                <h2 class="romantic-font" id="text-3-1"></h2>
                <p id="text-3-2"></p>
                <p id="text-3-3"></p>
                <button class="btn primary-btn hidden-element" id="btn-3" onclick="nextStep(4)">Just wanna ask one thing</button>
            </section>

            <!-- Step 4 -->
            <section id="step-4" class="step hidden">
                <h2 class="romantic-font highlight" id="text-4-1"></h2>
                <div class="button-group hidden-element" id="btn-4">
                    <button class="btn btn-yes" id="btn-yes" onclick="accept()">Yes!</button>
                    <button class="btn btn-no" id="btn-no">Nah</button>
                </div>
            </section>

            <!-- Step 5 -->
            <section id="step-5" class="step hidden">
                <div class="icon-wrapper hidden-element" id="icon-5">💖</div>
                <h2 class="romantic-font" id="text-5-1"></h2>
                <p id="text-5-2"></p>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
